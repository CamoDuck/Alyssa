<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #e8b4d0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #4a2040;
    }

    .container {
      text-align: center;
    }

    .label {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      font-weight: 300;
    }

    .countdown {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-item .number {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
    }

    .countdown-item .unit {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 0.4rem;
      font-weight: 500;
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      animation: sparkle-fade 0.6s ease-out forwards;
      z-index: 9999;
    }

    .sparkle-explosion {
      position: fixed;
      pointer-events: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      animation: sparkle-explode 0.7s ease-out forwards;
      z-index: 9999;
    }

    .click-ripple {
      position: fixed;
      pointer-events: none;
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      width: 10px;
      height: 10px;
      transform: translate(-50%, -50%);
      animation: ripple-expand 0.5s ease-out forwards;
      z-index: 9998;
    }

    @keyframes sparkle-fade {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }
    }

    @keyframes sparkle-explode {
      0% {
        opacity: 1;
        transform: translate(var(--tx), var(--ty)) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(var(--tx) * 3), calc(var(--ty) * 3)) scale(0);
      }
    }

    @keyframes ripple-expand {
      0% {
        width: 10px;
        height: 10px;
        opacity: 0.8;
      }
      100% {
        width: 120px;
        height: 120px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Your 2 year anniverssary gift in...</p>
    <div class="countdown">
      <div class="countdown-item">
        <span class="number" id="days">00</span>
        <span class="unit">Days</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="hours">00</span>
        <span class="unit">Hours</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="minutes">00</span>
        <span class="unit">Minutes</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="seconds">00</span>
        <span class="unit">Seconds</span>
      </div>
    </div>
  </div>

  <script>
    const targetDate = new Date('2026-03-16T00:00:00-08:00');

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const sparkleColors = ['#fff', '#ffd6f0', '#f0c0ff', '#ffe0f5', '#d4a0e8', '#ffffff'];

    function createSparkle(x, y) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
      const offsetX = (Math.random() - 0.5) * 50;
      const offsetY = (Math.random() - 0.5) * 50;
      const size = Math.random() * 16 + 12;
      el.style.left = (x + offsetX) + 'px';
      el.style.top = (y + offsetY) + 'px';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.backgroundColor = color;
      el.style.boxShadow = `0 0 ${size}px ${color}`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    let moveThrottle = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - moveThrottle < 30) return;
      moveThrottle = now;
      for (let i = 0; i < 2; i++) {
        createSparkle(e.clientX, e.clientY);
      }
    });

    document.addEventListener('click', (e) => {
      const count = 18;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'sparkle-explosion';
        const angle = (2 * Math.PI / count) * i + (Math.random() - 0.5) * 0.5;
        const dist = Math.random() * 60 + 40;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        const size = Math.random() * 12 + 8;
        el.style.left = e.clientX + 'px';
        el.style.top = e.clientY + 'px';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.backgroundColor = color;
        el.style.boxShadow = `0 0 ${size + 2}px ${color}`;
        el.style.setProperty('--tx', tx + 'px');
        el.style.setProperty('--ty', ty + 'px');
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }

      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });
  </script>
</body>
</html>
